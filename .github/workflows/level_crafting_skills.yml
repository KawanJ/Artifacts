name: Level crafting skills

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Crafting skill to level (weaponcrafting, gearcrafting, jewelrycrafting)'
        required: true
        type: string
      item_code:
        description: 'Code of the item to craft for XP'
        required: true
        type: string

jobs:
  level_crafting_skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run level-crafting-skills script
        env:
          ARTIFACTS_API_KEY: ${{ secrets.ARTIFACTS_API_KEY }}
        run: |
          python scripts/level_crafting_skills.py \
            ${{ inputs.skill }} \
            ${{ inputs.item_code }}
