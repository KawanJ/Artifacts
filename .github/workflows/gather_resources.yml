name: Gather Resources

on:
  workflow_dispatch:
    inputs:
      resource_name:
        description: 'Name of the resource to gather'
        required: true
        type: string
      amount:
        description: 'Number of times to gather the resource'
        required: true
        type: number
        default: 1

jobs:
  gather:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run gather resources script
        env:
          ARTIFACTS_API_KEY: ${{ secrets.ARTIFACTS_API_KEY }}
          LOG_LEVEL: INFO
        run: python scripts/gather_resources.py "${{ inputs.resource_name }}" ${{ inputs.amount }}
