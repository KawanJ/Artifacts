name: Fight Monsters

on:
  workflow_dispatch:
    inputs:
      monster_code:
        description: 'Code of the monster to fight (e.g., chicken, goblin)'
        required: true
        type: string
      times:
        description: 'Number of times to fight the monster'
        required: false
        type: number
        default: 1

jobs:
  fight:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run fight monsters script
        env:
          ARTIFACTS_API_KEY: ${{ secrets.ARTIFACTS_API_KEY }}
        run: python scripts/fight_monsters.py ${{ inputs.monster_code }} ${{ inputs.times }}
